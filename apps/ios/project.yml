name: PolishedJapaneseTraining
options:
  bundleIdPrefix: com.polished
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  PolishedJapaneseTraining:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PolishedJapaneseTraining/App
      - path: PolishedJapaneseTraining/Models
      - path: PolishedJapaneseTraining/Networking
      - path: PolishedJapaneseTraining/Views
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polished.japanesetraining
        PRODUCT_NAME: PolishedJapaneseTraining
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
        APP_API_BASE_URL: "http://127.0.0.1:3001/api"
        INFOPLIST_KEY_CFBundleDisplayName: Polished
        INFOPLIST_KEY_APP_API_BASE_URL: "$(APP_API_BASE_URL)"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "録音した音声を文字起こしし、AIフィードバックを作成するためにマイクを使用します。"
