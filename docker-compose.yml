services:
  postgres:
    image: postgres:16-alpine
    container_name: polished-japanese-training-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: polished_japanese_training
      POSTGRES_USER: polished
      POSTGRES_PASSWORD: polished
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
